<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Modern Image Gallery</h1>

  <!-- Filter Buttons -->
  <div class="buttons">
    <button onclick="filterSelection('all')">All</button>
    <button onclick="filterSelection('nature')">Nature</button>
    <button onclick="filterSelection('city')">City</button>
    <button onclick="filterSelection('animals')">Animals</button>
  </div>

  <!-- Gallery -->
  <div class="gallery">

    <div class="image nature">
      <img src="https://picsum.photos/id/1015/400/300" alt="">
    </div>

    <div class="image city">
      <img src="https://picsum.photos/id/1011/400/300" alt="">
    </div>

    <div class="image animals">
      <img src="https://picsum.photos/id/1025/400/300" alt="">
    </div>

    <div class="image nature">
      <img src="https://picsum.photos/id/1039/400/300" alt="">
    </div>

    <div class="image city">
      <img src="https://picsum.photos/id/1043/400/300" alt="">
    </div>

    <div class="image animals">
      <img src="https://picsum.photos/id/237/400/300" alt="">
    </div>

  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="close">&times;</span>

    <button class="prev">&#10094;</button>

    <img class="lightbox-img" id="lightbox-img">

    <button class="next">&#10095;</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
